version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: novel_forge_db
    environment:
      POSTGRES_USER: novelforge
      POSTGRES_PASSWORD: novelforge123
      POSTGRES_DB: novelforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
